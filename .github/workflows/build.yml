name: Build

on:
  push:
    branches: [main, master]
    tags-ignore:
      - '*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FullCompo.sln

      - name: Build
        run: dotnet build FullCompo.sln --no-restore -c Release -v minimal

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.0.1

      - name: Publish
        run: dotnet publish FullCompo.App/FullCompo.App.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=false -o ./publish/${{ matrix.rid }}

      - name: Pack with Velopack
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          vpk pack `
            --packId FullCompo `
            --packVersion $version `
            --packDir ./publish/${{ matrix.rid }} `
            --mainExe FullCompo.exe `
            --outputDir ./releases/${{ matrix.rid }} `
            --runtime ${{ matrix.rid }} `
            --channel ${{ matrix.rid }} `
            --icon FullCompo.App/Assets/logo.ico

      - name: Prepare release zip
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem ./releases/${{ matrix.rid }}/*-Portable.zip | Select-Object -First 1
          if (-not $portableZip) {
            Write-Error "Portable zip not found in ./releases/${{ matrix.rid }}!"
            exit 1
          }
          $dest = "./dist/FullCompo-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive -Path $portableZip.FullName -DestinationPath $dest -Force
          Write-Host "Extracted portable zip to $dest"
          $zipPath = "./dist/FullCompo-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$dest\*" -DestinationPath $zipPath -Force
          Write-Host "Created release zip: $zipPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FullCompo-${{ matrix.rid }}
          path: ./dist/FullCompo-${{ matrix.rid }}.zip
          retention-days: 7

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: nightly
          name: Nightly Build
          draft: false
          prerelease: true
          files: ./dist/FullCompo-${{ matrix.rid }}.zip
          body: |
            Automated nightly build from commit ${{ github.sha }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          $assetName = "FullCompo-${{ matrix.rid }}.zip"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/nightly/$assetName"
          "- [$assetName]($downloadUrl)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build summary
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $commit = "${{ github.sha }}"
          $runId = "${{ github.run_id }}"
          $summary = @"
          # Build Summary

          - Commit: $commit
          - Run: #$runId
          - Version: nightly

          ## Download

          - [Download Artifact](https://github.com/$repo/actions/runs/$runId)
          - [Nightly.link Download](https://nightly.link/$repo/workflows/build/main)

          ## Windows

          - [FullCompo-win-x64.zip](https://github.com/$repo/releases/download/nightly/FullCompo-win-x64.zip)
          - [FullCompo-win-x86.zip](https://github.com/$repo/releases/download/nightly/FullCompo-win-x86.zip)
          - [FullCompo-win-arm64.zip](https://github.com/$repo/releases/download/nightly/FullCompo-win-arm64.zip)
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
